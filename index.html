<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OBMC INTRAMS - Home</title>

    <link rel="icon" type="image/x-icon" href="OBMC Logo.png">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --pastel-red: #ff8a80;
            --pastel-yellow: #ffe57f;
            --pastel-blue: #80d8ff;
            --pastel-green: #b9f6ca;
        }

        body {
            background-color: #fdfbfb;
            background-image: radial-gradient(#ffe57f 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            font-family: 'Quicksand', sans-serif;
            padding-top: 120px;
            color: #444;
        }

        .navbar-custom {
            background-color: var(--pastel-red) !important;
            padding: 15px 5%;
            border-bottom: 6px solid var(--pastel-yellow);
            border-radius: 0 0 25px 25px;
        }

        .navbar-brand {
            font-family: 'Bangers', cursive;
            font-size: 2.5em;
            color: white !important;
            text-shadow: 3px 3px 0px var(--pastel-blue);
        }

        .nav-link { color: white !important; font-weight: 700; margin-left: 15px; }

        .hero-text {
            font-family: 'Bangers', cursive;
            color: var(--pastel-red);
            font-size: 5em;
            text-align: center;
            text-shadow: 4px 4px 0px var(--pastel-yellow);
            margin-bottom: 40px;
        }

        /* Cute Team Gallery */
        .team-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 0 10%;
            margin-bottom: 50px;
        }

        .team-card {
            background: white;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 6px solid #eee;
        }

        .team-card:hover { transform: scale(1.05) rotate(2deg); }
        
        /* Team Colors */
        .red-team { border-color: var(--pastel-red); box-shadow: 8px 8px 0 var(--pastel-red); }
        .yellow-team { border-color: var(--pastel-yellow); box-shadow: 8px 8px 0 var(--pastel-yellow); }
        .blue-team { border-color: var(--pastel-blue); box-shadow: 8px 8px 0 var(--pastel-blue); }
        .green-team { border-color: var(--pastel-green); box-shadow: 8px 8px 0 var(--pastel-green); }

        .team-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 15px;
            background-color: #f0f0f0;
            object-fit: cover;
            border: 4px solid #fff;
        }

        .team-name { font-family: 'Bangers', cursive; font-size: 2em; margin-bottom: 5px; }
        .team-slogan { font-size: 0.9em; font-weight: 700; color: #777; }

        .footer {
            text-align: center;
            padding: 30px;
            font-family: 'Bangers', cursive;
            color: var(--pastel-red);
            font-size: 1.5em;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container-fluid">
    <a class="navbar-brand" href="index.html">
            <img src="https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/8b5611eb-ff3a-407f-9adc-e116a23373fc/OBMC+LOGO+2024-04.png" alt="OBMC Logo" style="height: 50px; width: auto; border-radius: 50%; margin-right: 10px;">
            OBMC INTRAMS!
        </a>
        <div class="ms-auto d-flex">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="signup.html">Sign Up</a>
            <a class="nav-link" href="teamchecker.html">Team Checker</a>
            <a class="nav-link" href="playerchecker.html">Players</a>
        </div>
    </div>
</nav>
<h1 class="hero-text">MEET THE TEAMS!</h1>

<div class="text-center mb-5">
    <p style="font-size: 1.5em; font-weight: 700; color: #666; font-style: italic;">
        Please sign up to see your future winning team! ✨
    </p>
</div>

<div class="team-container">
    <div class="team-card red-team">
        <img src="https://mir-s3-cdn-cf.behance.net/project_modules/1400/b3130029774351.56bd3643cee94.png" alt="Red Team" class="team-img" onerror="this.src='https://placehold.co/150x150/ff8a80/ffffff?text=❤️'">
        <div class="team-name" style="color: var(--pastel-red);">RED BULLDOGS</div>
        <div class="team-slogan">We do it right!</div>
    </div>

    <div class="team-card yellow-team">
        <img src="https://static.vecteezy.com/system/resources/previews/049/426/238/non_2x/a-fierce-yellow-tiger-mascot-with-a-snarling-expression-perfect-for-sport-teams-school-logos-or-any-brand-that-needs-a-powerful-and-authoritative-image-free-vector.jpg" alt="Yellow Team" class="team-img" onerror="this.src='https://placehold.co/150x150/ffe57f/444444?text=☀️'">
        <div class="team-name" style="color: #d4af37;">YELLOW TIGERS</div>
        <div class="team-slogan">Own the court!</div>
    </div>

    <div class="team-card blue-team">
        <img src="https://static.vecteezy.com/system/resources/previews/049/427/435/non_2x/bold-blue-bear-logo-in-a-geometric-style-free-vector.jpg" alt="Blue Team" class="team-img" onerror="this.src='https://placehold.co/150x150/80d8ff/ffffff?text=🌊'">
        <div class="team-name" style="color: var(--pastel-blue);">BLUE BEARS</div>
        <div class="team-slogan">Pure drive!!!</div>
    </div>

    <div class="team-card green-team">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQkmjt5GmY_69eYqBOQcNKR-bZMjHGhuC7JHg&s" alt="Green Team" class="team-img" onerror="this.src='https://placehold.co/150x150/b9f6ca/2d6a4f?text=🌿'">
        <div class="team-name" style="color: #2d6a4f;">GREEN HORNETS</div>
        <div class="team-slogan">We make it look easy</div>
    </div>
</div>

<div class="footer">
    OBMC INTRAMURALS 2025-2026
</div>

<script type="py" src="main.py"></script>

</body>
</html>
