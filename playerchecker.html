<style>
        :root {
            --team-red: #ff8a80;
            --team-yellow: #ffe57f;
            --team-blue: #80d8ff;
            --team-green: #b9f6ca;
        }

        body {
            background-color: #fdfbfb;
            background-image: radial-gradient(var(--team-yellow) 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            font-family: 'Quicksand', sans-serif;
            padding-top: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }



        .navbar-custom {
            background-color: var(--team-red) !important;
            padding: 10px 5%;
            border-bottom: 6px solid var(--team-yellow);
            border-radius: 0 0 30px 30px;
        }

        .navbar-brand {
            font-family: 'Bangers', cursive;
            font-size: 2.2em;
            color: white !important;
            text-shadow: 2px 2px 0px var(--team-blue);
        }

        .nav-link {
            color: white !important;
            font-weight: 700;
            margin-left: 20px;
            transition: 0.3s;
        }

        .nav-link:hover { transform: scale(1.1); color: var(--team-yellow) !important; }


        .cute-card {
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 15px 15px 0px var(--team-blue);
            width: 380px;
            text-align: center;
            border: 6px solid var(--team-blue);
        }

        h2 { font-family: 'Bangers', cursive; color: #555; font-size: 2.5em; }
</style>


</head>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">

                 alt="OBMC Logo"
                 style="height: 50px; width: auto; border-radius: 50%; margin-right: 10px;">

<div class="container">
    <form>
        <div class="cute-card">
            <h2>What's your team?</h2>

        <select id="grade" class="form-select">
            <option value="rb">Red Bulldogs</option>
            <option value="bb">Blue Bears</option>
            <option value="gh">Green Hornets</option>
            <option value="yt">Yellow Tigers</option>
        </select>

        <div id="output" class="mt-3"></div>
    </div>
