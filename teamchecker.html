<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OBMC INTRAMS - Team Checker</title>

    <link rel="icon" type="image/x-icon" href="OBMC Logo.png">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --team-red: #ff8a80;
            --team-yellow: #ffe57f;
            --team-blue: #80d8ff;
            --team-green: #b9f6ca;
        }

        body {
            background-color: #fdfbfb;
            background-image: radial-gradient(var(--team-yellow) 0.8px, transparent 0.8px);
            background-size: 24px 24px;
            font-family: 'Quicksand', sans-serif;
            padding-top: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar-custom {
            background-color: var(--team-red) !important;
            padding: 10px 5%;
            border-bottom: 6px solid var(--team-yellow);
            border-radius: 0 0 30px 30px;
        }

        .navbar-brand {
            font-family: 'Bangers', cursive;
            font-size: 2.2em;
            color: white !important;
            text-shadow: 2px 2px 0px var(--team-blue);
        }

        .nav-link {
            color: white !important;
            font-weight: 700;
            margin-left: 20px;
            transition: 0.3s;
        }

        .nav-link:hover {
            transform: scale(1.1);
            color: var(--team-yellow) !important;
        }

        .cute-card {
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 15px 15px 0px var(--team-blue);
            width: 400px;
            text-align: center;
            border: 6px solid var(--team-blue);
        }

        h2 {
            font-family: 'Bangers', cursive;
            color: #555;
            font-size: 2.5em;
        }

        .form-select {
            border: 4px solid var(--team-green);
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 15px;
            font-weight: 700;
            text-align: center;
        }

        .question {
            margin-top: 15px;
            font-weight: 700;
        }

        .btn-checker {
            background-color: var(--team-green);
            color: #2d6a4f;
            font-family: 'Bangers', cursive;
            font-size: 1.6em;
            border: none;
            width: 100%;
            border-radius: 25px;
            box-shadow: 0 6px 0px #86efac;
            transition: 0.1s;
            margin-top: 20px;
        }

        .btn-checker:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #86efac;
        }

        #output {
            margin-top: 20px;
            font-weight: 700;
            font-size: 1.1em;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 30px;
            font-family: 'Bangers', cursive;
            color: var(--team-red);
            font-size: 1.5em;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <img src="https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/8b5611eb-ff3a-407f-9adc-e116a23373fc/OBMC+LOGO+2024-04.png"
                 alt="OBMC Logo"
                 style="height: 50px; width: auto; border-radius: 50%; margin-right: 10px;">
            OBMC INTRAMS!
        </a>
        <div class="ms-auto d-flex">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="signup.html">Sign Up</a>
            <a class="nav-link" href="teamchecker.html">Team Checker</a>
            <a class="nav-link" href="playerchecker.html">Players</a>
        </div>
    </div>
</nav>

<div class="cute-card">
    <h2>TEAM CHECKER</h2>

    <div class="question">
        Are you done with the online registration?
    </div>
    <input type="radio" name="registration" id="reg_yes"> Yes
    <input type="radio" name="registration" id="reg_no"> No

    <div class="question">
        Do you have your medical certificate?
    </div>
    <input type="radio" name="medical" id="med_yes"> Yes
    <input type="radio" name="medical" id="med_no"> No

    <div class="question">
        What is your grade?
    </div>
    <select id="grade" class="form-select">
        <option value="7">Grade 7</option>
        <option value="8">Grade 8</option>
        <option value="9">Grade 9</option>
        <option value="10">Grade 10</option>
    </select>

    <div class="question">
        What is your section?
    </div>
    <select id="section" class="form-select">
        <option value="Ruby">Ruby</option>
        <option value="Emerald">Emerald</option>
        <option value="Sapphire">Sapphire</option>
        <option value="Topaz">Topaz</option>
        <option value="Jade">Jade</option>
    </select>

    <button type="button" class="btn-checker" py-click="sub">
        CHECK TEAM
    </button>

    <div id="output"></div>
</div>

<div class="footer">
    OBMC INTRAMURALS 2025-2026
</div>

<script type="py" src="main3.py"></script>

</body>
</html>
